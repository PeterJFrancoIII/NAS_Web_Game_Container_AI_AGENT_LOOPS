; Optional companion config for IPX-to-UDP wsock32.dll wrappers.
; Copy into the assets folder if your wrapper reads ipxwrapper.ini.
;
; Static container IPs for this stack:
;   Player 1: 172.22.20.11
;   Player 2: 172.22.20.12
;
; UDP LAN traffic for Red Alert 2 commonly uses port 7460.
; Tune the sections below to match the wrapper you install.

[General]
; Some wrappers require disabling the host NIC and using UDP only.
; DisableRealAdapter=1

[Peers]
; If your wrapper supports explicit peer lists, include both containers:
; 172.22.20.11
; 172.22.20.12
