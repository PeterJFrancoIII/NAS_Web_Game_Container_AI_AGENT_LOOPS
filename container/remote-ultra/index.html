<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RA2 Ultra Stream</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #e8e8e8; font: 14px/1.4 system-ui, sans-serif; }
    #gameSurface {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      container-type: size;
      --stream-ar-w: 4;
      --stream-ar-h: 3;
      outline: none;
    }
    #gameSurface:fullscreen,
    #gameSurface:-webkit-full-screen {
      width: 100%;
      height: 100%;
      background: #000;
    }
    #canvas {
      display: block;
      aspect-ratio: var(--stream-ar-w, 4) / var(--stream-ar-h, 3);
      width: min(100cqw, calc(100cqh * var(--stream-ar-w, 4) / var(--stream-ar-h, 3)));
      height: min(100cqh, calc(100cqw * var(--stream-ar-h, 3) / var(--stream-ar-w, 4)));
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: #000;
      cursor: crosshair;
      touch-action: none;
    }
    #overlay { position: fixed; inset: 0; display: grid; place-items: center; background: rgba(0,0,0,0.85); z-index: 20; cursor: pointer; }
    #overlay.hidden { display: none; }
    #overlayBox { max-width: 640px; padding: 20px; border: 1px solid #3a5a7a; border-radius: 8px; background: #111; text-align: center; cursor: default; }
    #overlayConnectButton {
      display: block;
      width: 100%;
      margin: 0 0 8px;
      padding: 14px 16px;
      background: #1a3a5a;
      color: #e8f4ff;
      border: 1px solid #5a8ab0;
      border-radius: 6px;
      font: 16px/1.3 system-ui, sans-serif;
      cursor: pointer;
    }
    #overlayConnectButton:hover { background: #24384d; }
    #overlayConnectButton:disabled { opacity: 0.6; cursor: wait; }
    .overlay-hint {
      margin: 10px 0 0;
      font-size: 13px;
      color: #a8c4dc;
      line-height: 1.4;
    }
    #overlay.picker-open #overlayStep1 { display: none; }
    #overlay.picker-open #gamePicker.visible,
    #overlay.picker-open #watchPanel.visible { display: block; }
    #controlPanel {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 5;
      min-width: 240px;
      max-width: 320px;
      background: rgba(0,0,0,0.88);
      border: 1px solid rgba(155,211,255,0.45);
      border-radius: 8px;
      color: #dff2ff;
      font-size: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #controlPanel.collapsed #panelBody { display: none; }
    #panelHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      cursor: pointer;
      user-select: none;
      font-weight: 600;
      border-bottom: 1px solid rgba(155,211,255,0.2);
    }
    #panelHeader:hover { background: rgba(155,211,255,0.08); }
    #panelToggle { font-size: 10px; opacity: 0.8; }
    #panelBody { padding: 10px; }
    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      margin-bottom: 3px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.85;
    }
    .field select,
    .field button {
      width: 100%;
      padding: 5px 6px;
      background: #1a1a1a;
      color: #e8f4ff;
      border: 1px solid #3a5a7a;
      border-radius: 4px;
      font-size: 12px;
    }
    .field select:disabled { opacity: 0.45; }
    #transportStatus {
      margin-top: 8px;
      padding: 8px;
      background: rgba(20,30,40,0.9);
      border: 1px solid rgba(100,140,180,0.3);
      border-radius: 4px;
      font: 11px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      max-height: 180px;
      overflow-y: auto;
    }
    #pendingNotice {
      display: none;
      margin-top: 6px;
      padding: 6px 8px;
      background: rgba(180,120,0,0.25);
      border: 1px solid rgba(255,200,80,0.4);
      border-radius: 4px;
      font-size: 11px;
      color: #ffe8a0;
    }
    #pendingNotice.visible { display: block; }
    .field-hint {
      margin: 8px 0 0;
      font-size: 11px;
      line-height: 1.45;
      color: #a8c4dc;
      opacity: 0.9;
    }
    html.game-mode-fullscreen,
    html.game-mode-fullscreen body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    html.game-mode-locked #canvas { cursor: none; }
    html.game-mode-locked #controlPanel { display: none; }
    html.game-mode-fullscreen #controlPanel { display: none; }
    #cursorOverlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 6;
      overflow: hidden;
    }
    #cursorOverlay.hidden { display: none; }
    .cursor-marker {
      position: fixed;
      left: 0;
      top: 0;
      width: 20px;
      height: 20px;
      margin: -10px 0 0 -10px;
      pointer-events: none;
      box-sizing: border-box;
    }
    .cursor-marker::before,
    .cursor-marker::after {
      content: "";
      position: absolute;
      background: currentColor;
    }
    .cursor-marker::before {
      left: 50%;
      top: 2px;
      width: 2px;
      height: 16px;
      margin-left: -1px;
    }
    .cursor-marker::after {
      top: 50%;
      left: 2px;
      height: 2px;
      width: 16px;
      margin-top: -1px;
    }
    #localCursor {
      color: #ffffff;
      filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.9));
    }
    #localCursor::before,
    #localCursor::after {
      background: #ffffff;
    }
    #remoteCursor {
      color: rgba(255, 196, 72, 0.95);
      filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.9));
    }
    #remoteCursor::before,
    #remoteCursor::after {
      background: rgba(255, 196, 72, 0.95);
    }
    #gamePicker { margin-top: 16px; display: none; }
    #gamePicker.visible { display: block; }
    #gamePickerTitle {
      margin: 0 0 12px;
      font-size: 13px;
      color: #a8c4dc;
    }
    .game-pick-btn {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px 14px;
      background: #1a2a3a;
      color: #e8f4ff;
      border: 1px solid #3a5a7a;
      border-radius: 6px;
      font: 14px/1.3 system-ui, sans-serif;
      cursor: pointer;
      text-align: left;
    }
    .game-pick-btn:hover { background: #24384d; border-color: #5a8ab0; }
    .game-pick-btn:disabled { opacity: 0.5; cursor: wait; }
    .game-pick-btn.active {
      border-color: #6ab04c;
      background: #1a3a2a;
    }
    .game-pick-btn.active::after {
      content: " — in session";
      color: #8fd46a;
      font-size: 12px;
    }
    #gameSessionStatus {
      margin: 0 0 10px;
      font-size: 12px;
      color: #8fd46a;
    }
    #switchGameButton {
      width: 100%;
      margin-top: 4px;
      padding: 10px 12px;
      background: #1a2a3a;
      color: #e8f4ff;
      border: 1px solid #3a5a7a;
      border-radius: 6px;
      font: 13px/1.3 system-ui, sans-serif;
      cursor: pointer;
      text-align: left;
    }
    #watchPanel { margin-top: 16px; display: none; }
    #watchPanel.visible { display: block; }
    #watchStreamButton {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 12px 14px;
      background: #1a3a2a;
      color: #e8f4ff;
      border: 1px solid #6ab04c;
      border-radius: 6px;
      font: 14px/1.3 system-ui, sans-serif;
      cursor: pointer;
      text-align: left;
    }
    #watchStreamButton:hover { background: #245038; }
    #watchStatus {
      margin: 0 0 8px;
      font-size: 12px;
      color: #a8c4dc;
      line-height: 1.4;
    }
    .spectator-banner {
      color: #8fd46a;
      font-size: 12px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="gameSurface" tabindex="-1">
    <canvas id="canvas" width="1024" height="768"></canvas>
    <div id="cursorOverlay" class="hidden" aria-hidden="true">
      <div id="remoteCursor" class="cursor-marker" title="Remote cursor (in game)"></div>
      <div id="localCursor" class="cursor-marker" title="Local aim (your mouse)"></div>
    </div>
  </div>
  <div id="overlay"><div id="overlayBox">
    <div id="overlayStep1">
      <button id="overlayConnectButton" type="button">Click to choose a game</button>
      <p id="overlayHint" class="overlay-hint" hidden></p>
    </div>
    <div id="gamePicker">
      <div id="gamePickerTitle">Choose a game</div>
      <div id="gameSessionStatus" hidden></div>
      <div id="gamePickerButtons"></div>
    </div>
    <div id="watchPanel">
      <div id="watchStatus"></div>
      <button id="watchStreamButton" type="button">Watch stream</button>
    </div>
  </div></div>
  <div id="controlPanel" class="collapsed">
    <div id="panelHeader"><span>Transport</span><span id="panelToggle">▼</span></div>
    <div id="panelBody">
      <div id="wssVideoFields">
        <div class="field">
          <label for="videoQuality">Video quality</label>
          <select id="videoQuality">
            <option value="low">Low (20 fps)</option>
            <option value="balanced" selected>Balanced (24 fps)</option>
            <option value="sharp">Sharp (30 fps)</option>
          </select>
        </div>
      </div>
      <div class="field" id="videoCodecField">
        <label for="videoCodec">Video codec</label>
        <select id="videoCodec">
          <option value="H264">H.264 Low Latency</option>
          <option value="H265">H.265</option>
          <option value="H265_10" selected>H.265 10-bit</option>
        </select>
      </div>
      <div class="field" id="videoBitrateField">
        <label for="videoBitrate">Video bitrate</label>
        <select id="videoBitrate">
          <option value="300000">300 kbps</option>
          <option value="450000">450 kbps</option>
          <option value="600000">600 kbps</option>
          <option value="900000">900 kbps</option>
          <option value="1200000">1.2 Mbps</option>
          <option value="1600000">1.6 Mbps</option>
          <option value="2000000" selected>2.0 Mbps</option>
          <option value="3500000">3.5 Mbps</option>
        </select>
      </div>
      <div class="field" id="videoFpsField">
        <label for="videoFps">Frame rate</label>
        <select id="videoFps">
          <option value="20">20 fps</option>
          <option value="24" selected>24 fps</option>
          <option value="30">30 fps</option>
        </select>
      </div>
      <div class="field">
        <label for="audioEncoder">Audio encoder</label>
        <select id="audioEncoder">
          <option value="opus" selected>Opus low-latency</option>
          <option value="pcm">PCM fallback</option>
        </select>
      </div>
      <div class="field">
        <label for="audioBitrate">Audio bitrate</label>
        <select id="audioBitrate">
          <option value="64000" selected>64 kbps</option>
          <option value="96000">96 kbps</option>
          <option value="128000">128 kbps</option>
        </select>
      </div>
      <div class="field">
        <label for="audioQuality">Audio sample rate</label>
        <select id="audioQuality">
          <option value="48000" selected>48 kHz stereo (Opus)</option>
          <option value="44100">44.1 kHz stereo (PCM only)</option>
        </select>
      </div>
      <div class="field">
        <label for="inputMoveHz">Input polling</label>
        <select id="inputMoveHz">
          <option value="60" selected>60 Hz mouse</option>
          <option value="125">125 Hz mouse</option>
          <option value="200">200 Hz mouse</option>
        </select>
      </div>
      <div class="field">
        <label>Game</label>
        <button id="switchGameButton" type="button">Switch game…</button>
        <p id="activeGameStatus" class="field-hint">No game session reported.</p>
      </div>
      <div class="field">
        <label for="gameModeButton">Display</label>
        <button id="gameModeButton" type="button">Game mode (fullscreen + lock)</button>
        <p class="field-hint">Locks the mouse inside the stream. White crosshair = your local aim; amber = where the game cursor is (may lag behind). Enter with the Game mode button or Ctrl+Alt+L. Exit the same way or press Esc twice.</p>
      </div>
      <div id="pendingNotice">Applying settings…</div>
      <div id="transportStatus">status: loading</div>
    </div>
  </div>
  <script src="webrtc-ice-utils.js?v=115"></script>
  <script src="ultra-play.js?v=115"></script>
</body>
</html>
