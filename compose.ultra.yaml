# Ultra-light Arch browser streaming overlay.
# Launch: RA2_COMPOSE_ULTRA=1 docker compose --env-file .env -f compose.yaml -f compose.https.yaml -f compose.ultra.yaml up -d

x-ra2-ultra-env: &ra2-ultra-env
  ULTRA_STREAM_ENABLED: "1"
  ULTRA_GATEWAY_PORT: "6080"
  ULTRA_GATEWAY_TLS: ${ULTRA_GATEWAY_TLS:-1}
  ULTRA_VIDEO_CODEC: ${ULTRA_VIDEO_CODEC:-H265_10}
  ULTRA_STREAM_CODEC_LOCK: ${ULTRA_STREAM_CODEC_LOCK:-}
  ULTRA_VIDEO_REQUIRE_HW: ${ULTRA_VIDEO_REQUIRE_HW:-1}
  # Stream size defaults to the display (RESOLUTION); set explicit values only
  # to force a different encode size at deploy time.
  ULTRA_VIDEO_WIDTH: ${ULTRA_VIDEO_WIDTH:-}
  ULTRA_VIDEO_HEIGHT: ${ULTRA_VIDEO_HEIGHT:-}
  RA2_DISPLAY_DEPTH: ${RA2_DISPLAY_DEPTH:-16}
  ULTRA_VIDEO_FPS: ${ULTRA_VIDEO_FPS:-24}
  ULTRA_GAME_MAX_FPS: ${ULTRA_GAME_MAX_FPS:-24}
  ULTRA_GAME_MAX_TICKS: ${ULTRA_GAME_MAX_TICKS:-0}
  ULTRA_MAP_LOAD_CAPTURE_PAUSE_S: ${ULTRA_MAP_LOAD_CAPTURE_PAUSE_S:-60}
  ULTRA_VIDEO_BITRATE: ${ULTRA_VIDEO_BITRATE:-2000000}
  ULTRA_VIDEO_KEYFRAME_SECONDS: ${ULTRA_VIDEO_KEYFRAME_SECONDS:-1}
  ULTRA_VIDEO_DIAGNOSTICS: ${ULTRA_VIDEO_DIAGNOSTICS:-1}
  ULTRA_H265_TEST_ENABLED: ${ULTRA_H265_TEST_ENABLED:-1}
  ULTRA_STREAM_CPUSET: ${ULTRA_STREAM_CPUSET:-2,3}
  ULTRA_VIDEO_GPU_SCALE: ${ULTRA_VIDEO_GPU_SCALE:-1}
  ULTRA_AUDIO_CODEC: ${ULTRA_AUDIO_CODEC:-opus}
  ULTRA_AUDIO_BITRATE: ${ULTRA_AUDIO_BITRATE:-64000}
  ULTRA_AUDIO_FRAME_MS: ${ULTRA_AUDIO_FRAME_MS:-20}
  ULTRA_AUDIO_RATE: ${ULTRA_AUDIO_RATE:-48000}
  ULTRA_AUDIO_TRANSPORT_RATE: ${ULTRA_AUDIO_TRANSPORT_RATE:-${ULTRA_AUDIO_RATE:-48000}}
  ULTRA_INPUT_MOVE_HZ: ${ULTRA_INPUT_MOVE_HZ:-60}
  LIBVA_DRIVER_NAME: ${LIBVA_DRIVER_NAME:-i965}
  GST_VAAPI_ALL_DRIVERS: "1"
  GST_VA_ALL_DRIVERS: "1"
  RA2_ENABLE_NOVNC_FALLBACK: "0"
  RA2_ENABLE_AUDIO_PROXY: "0"
  RA2_ENABLE_LATENCY_PROXY: "0"
  WEBRTC_ENABLED: "0"
  ULTRA_GAME_LOG_ROOT: /home/commander/ra2-logs-root
  ULTRA_GAME_HOST_LOG_DIR: ${LOGS_DIR:-/volume2/Data/App_Development/ra2-lan-party/logs}
  GAME_LAUNCHER_ENABLED: ${GAME_LAUNCHER_ENABLED:-1}
  # In-container paths (host bind sources use *_ASSETS_HOST in compose volumes):
  AOE2_ASSETS_DIR: /home/commander/aoe2_assets
  AOE2_PATCH_DIR: /home/commander/aoe2_patches
  AOE2_STAGE: /home/commander/aoe2_staging
  AOE2_10C_DATA_DIR: /home/commander/aoe2_10c_data
  SC_ASSETS_DIR: /home/commander/sc_assets
  SC_DISC_DIR: /home/commander/sc_disc
  SC_STAGE: /home/commander/sc_staging

x-ra2-ultra: &ra2-ultra
  image: ra2-lan-party:ultra
  build:
    context: .
    dockerfile: container/Dockerfile.ultra
    args:
      WINE_BUILD: ${WINE_BUILD:-10.8}
      WINE_VARIANT: ${WINE_VARIANT:-amd64}
      WINE_ARCH: ${WINE_ARCH:-win32}
      WINE_ENABLE_MULTILIB: ${WINE_ENABLE_MULTILIB:-1}
  devices:
    - ${DRI_DEVICE:-/dev/dri}:/dev/dri
  group_add:
    - "${RENDER_GID:-937}"
    - "${VIDEO_GID:-44}"
  environment:
    <<: *ra2-ultra-env
  healthcheck:
    test: ["CMD-SHELL", "/bin/sh /opt/ra2/healthcheck-ultra.sh || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 300s
  volumes:
    - ./container/entrypoint-ultra.sh:/opt/ra2/entrypoint.sh:ro
    - ./container/supervisord.ultra.conf:/opt/ra2/supervisord.conf:ro
    - ./container/start-game-ultra.sh:/opt/ra2/start-game-ultra.sh:ro
    - ./container/run-game-session.sh:/opt/ra2/run-game-session.sh:ro
    - ./container/prepare-starcraft-session.sh:/opt/ra2/prepare-starcraft-session.sh:ro
    - ./container/prepare-aoe2-session.sh:/opt/ra2/prepare-aoe2-session.sh:ro
    - ./container/install-aoe2-10c.sh:/opt/ra2/install-aoe2-10c.sh:ro
    - ./container/game-launcher.sh:/opt/ra2/game-launcher.sh:ro
    - ./container/game-session-state.sh:/opt/ra2/game-session-state.sh:ro
    - ./container/validate-game-id.sh:/opt/ra2/validate-game-id.sh:ro
    - ./container/secure-game-select.sh:/opt/ra2/secure-game-select.sh:ro
    - ./container/start-openbox-ultra.sh:/opt/ra2/start-openbox-ultra.sh:ro
    - ./container/openbox:/opt/ra2/openbox:ro
    - ./config/games.json:/opt/ra2/config/games.json:ro
    - ./config/aoe2-ddraw.ini:/opt/ra2/config/aoe2-ddraw.ini:ro
    - ./config/aoe2-language:/opt/ra2/config/aoe2-language:ro
    - ./config/starcraft-ddraw.ini:/opt/ra2/config/starcraft-ddraw.ini:ro
    - ./container/cleanup-xvfb-display.sh:/opt/ra2/cleanup-xvfb-display.sh:ro
    - ./container/start-xvfb-ultra.sh:/opt/ra2/start-xvfb-ultra.sh:ro
    - ./container/configure-display-modes.sh:/opt/ra2/configure-display-modes.sh:ro
    - ./container/apply-ultra-display.sh:/opt/ra2/apply-ultra-display.sh:ro
    - ./container/switch-game-display.sh:/opt/ra2/switch-game-display.sh:ro
    - ./container/sync-game-transport.sh:/opt/ra2/sync-game-transport.sh:ro
    - ./container/ensure-game-ini-links.sh:/opt/ra2/ensure-game-ini-links.sh:ro
    - ./container/sync-audio-transport.sh:/opt/ra2/sync-audio-transport.sh:ro
    - ./container/start-stream-gateway.sh:/opt/ra2/start-stream-gateway.sh:ro
    - ./container/log-video-diagnostics.sh:/opt/ra2/log-video-diagnostics.sh:ro
    - ./container/winedbg-minidump.sh:/opt/ra2/winedbg-minidump.sh:ro
    - ./container/ra2-stream-gateway.py:/opt/ra2/ra2-stream-gateway.py:ro
    - ./container/stream-helper.c:/opt/ra2/stream-helper.c:ro
    - ./container/remote-ultra:/opt/ra2/remote-ultra:ro
    - ${LOGS_DIR:-/volume2/Data/App_Development/ra2-lan-party/logs}:/home/commander/ra2-logs-root:rw

services:
  ra2-player-1:
    <<: *ra2-ultra
    volumes:
      - ${PREFIX1_DIR:-/volume2/Data/App_Development/ra2-lan-party/prefixes/player1-win32}:/home/commander/.wine:rw
      - ${ASSETS_DIR:-/volume2/Data/App_Development/ra2-lan-party/assets}:/home/commander/game_assets:ro
      - ${AOE2_ASSETS_HOST:-/volume2/Data/Games/2 Unpacked - Ready to Play/Age of Empires 2}:/home/commander/aoe2_assets:ro
      - ${AOE2_PATCH_HOST:-/volume2/Data/Games/1 Packed - Compressed/Age of Empires 2 II + The Conquerors + Patch 2.0a + Crack + Custom Maps (for Windows XP 7 8 8.1 10)}:/home/commander/aoe2_patches:ro
      - ${AOE2_STAGING_HOST:-/volume2/Data/Games/2 Unpacked - Ready to Play/Age of Empires 2/.disc-staging}:/home/commander/aoe2_staging:ro
      - ${AOE2_10C_DATA_HOST:-/volume2/Data/App_Development/ra2-lan-party/project/aoe2-10c-data}:/home/commander/aoe2_10c_data:ro
      - ${SC_ASSETS_HOST:-/volume2/Data/Games/2 Unpacked - Ready to Play/StarCraft}:/home/commander/sc_assets:ro
      - ${SC_DISC_HOST:-/volume2/Data/Games/1 Packed - Compressed/StarCraft & Brood War}:/home/commander/sc_disc:ro
      - ${SC_STAGING_HOST:-/volume2/Data/Games/2 Unpacked - Ready to Play/StarCraft/.disc-staging}:/home/commander/sc_staging:ro
      - ./container/entrypoint-ultra.sh:/opt/ra2/entrypoint.sh:ro
      - ./container/supervisord.ultra.conf:/opt/ra2/supervisord.conf:ro
      - ./container/start-game-ultra.sh:/opt/ra2/start-game-ultra.sh:ro
      - ./container/run-game-session.sh:/opt/ra2/run-game-session.sh:ro
      - ./container/prepare-starcraft-session.sh:/opt/ra2/prepare-starcraft-session.sh:ro
      - ./container/prepare-aoe2-session.sh:/opt/ra2/prepare-aoe2-session.sh:ro
      - ./container/install-aoe2-10c.sh:/opt/ra2/install-aoe2-10c.sh:ro
      - ./container/game-launcher.sh:/opt/ra2/game-launcher.sh:ro
      - ./container/game-session-state.sh:/opt/ra2/game-session-state.sh:ro
      - ./container/validate-game-id.sh:/opt/ra2/validate-game-id.sh:ro
      - ./container/secure-game-select.sh:/opt/ra2/secure-game-select.sh:ro
      - ./container/start-openbox-ultra.sh:/opt/ra2/start-openbox-ultra.sh:ro
      - ./container/openbox:/opt/ra2/openbox:ro
      - ./config/games.json:/opt/ra2/config/games.json:ro
      - ./config/aoe2-ddraw.ini:/opt/ra2/config/aoe2-ddraw.ini:ro
      - ./config/aoe2-language:/opt/ra2/config/aoe2-language:ro
      - ./config/starcraft-ddraw.ini:/opt/ra2/config/starcraft-ddraw.ini:ro
      - ./container/cleanup-xvfb-display.sh:/opt/ra2/cleanup-xvfb-display.sh:ro
      - ./container/start-xvfb-ultra.sh:/opt/ra2/start-xvfb-ultra.sh:ro
      - ./container/configure-display-modes.sh:/opt/ra2/configure-display-modes.sh:ro
      - ./container/apply-ultra-display.sh:/opt/ra2/apply-ultra-display.sh:ro
      - ./container/switch-game-display.sh:/opt/ra2/switch-game-display.sh:ro
      - ./container/sync-game-transport.sh:/opt/ra2/sync-game-transport.sh:ro
      - ./container/ensure-game-ini-links.sh:/opt/ra2/ensure-game-ini-links.sh:ro
      - ./container/sync-audio-transport.sh:/opt/ra2/sync-audio-transport.sh:ro
      - ./container/start-stream-gateway.sh:/opt/ra2/start-stream-gateway.sh:ro
      - ./container/log-video-diagnostics.sh:/opt/ra2/log-video-diagnostics.sh:ro
      - ./container/winedbg-minidump.sh:/opt/ra2/winedbg-minidump.sh:ro
      - ./container/ra2-stream-gateway.py:/opt/ra2/ra2-stream-gateway.py:ro
      - ./container/stream-helper.c:/opt/ra2/stream-helper.c:ro
      - ./container/remote-ultra:/opt/ra2/remote-ultra:ro
      - ${LOGS_DIR:-/volume2/Data/App_Development/ra2-lan-party/logs}:/home/commander/ra2-logs-root:rw

  ra2-player-2:
    <<: *ra2-ultra
    environment:
      <<: *ra2-ultra-env
      PLAYER_ID: "2"
      PLAYER_SERIAL: ${PLAYER2_SERIAL:?set PLAYER2_SERIAL in .env}
      ULTRA_GAME_DIAGNOSTIC_DIR: /home/commander/ra2-logs-root/player2
      ULTRA_GAME_WORK_DIR: /home/commander/ra2-logs-root/player2/game-work
    volumes:
      - ${PREFIX2_DIR:-/volume2/Data/App_Development/ra2-lan-party/prefixes/player2-win32}:/home/commander/.wine:rw
      - ${ASSETS_DIR:-/volume2/Data/App_Development/ra2-lan-party/assets}:/home/commander/game_assets:ro
      - ${AOE2_ASSETS_HOST:-/volume2/Data/Games/2 Unpacked - Ready to Play/Age of Empires 2}:/home/commander/aoe2_assets:ro
      - ${AOE2_PATCH_HOST:-/volume2/Data/Games/1 Packed - Compressed/Age of Empires 2 II + The Conquerors + Patch 2.0a + Crack + Custom Maps (for Windows XP 7 8 8.1 10)}:/home/commander/aoe2_patches:ro
      - ${AOE2_STAGING_HOST:-/volume2/Data/Games/2 Unpacked - Ready to Play/Age of Empires 2/.disc-staging}:/home/commander/aoe2_staging:ro
      - ${AOE2_10C_DATA_HOST:-/volume2/Data/App_Development/ra2-lan-party/project/aoe2-10c-data}:/home/commander/aoe2_10c_data:ro
      - ${SC_ASSETS_HOST:-/volume2/Data/Games/2 Unpacked - Ready to Play/StarCraft}:/home/commander/sc_assets:ro
      - ${SC_DISC_HOST:-/volume2/Data/Games/1 Packed - Compressed/StarCraft & Brood War}:/home/commander/sc_disc:ro
      - ${SC_STAGING_HOST:-/volume2/Data/Games/2 Unpacked - Ready to Play/StarCraft/.disc-staging}:/home/commander/sc_staging:ro
      - ./container/entrypoint-ultra.sh:/opt/ra2/entrypoint.sh:ro
      - ./container/supervisord.ultra.conf:/opt/ra2/supervisord.conf:ro
      - ./container/start-game-ultra.sh:/opt/ra2/start-game-ultra.sh:ro
      - ./container/run-game-session.sh:/opt/ra2/run-game-session.sh:ro
      - ./container/prepare-starcraft-session.sh:/opt/ra2/prepare-starcraft-session.sh:ro
      - ./container/prepare-aoe2-session.sh:/opt/ra2/prepare-aoe2-session.sh:ro
      - ./container/install-aoe2-10c.sh:/opt/ra2/install-aoe2-10c.sh:ro
      - ./container/game-launcher.sh:/opt/ra2/game-launcher.sh:ro
      - ./container/game-session-state.sh:/opt/ra2/game-session-state.sh:ro
      - ./container/validate-game-id.sh:/opt/ra2/validate-game-id.sh:ro
      - ./container/secure-game-select.sh:/opt/ra2/secure-game-select.sh:ro
      - ./container/start-openbox-ultra.sh:/opt/ra2/start-openbox-ultra.sh:ro
      - ./container/openbox:/opt/ra2/openbox:ro
      - ./config/games.json:/opt/ra2/config/games.json:ro
      - ./config/aoe2-ddraw.ini:/opt/ra2/config/aoe2-ddraw.ini:ro
      - ./config/aoe2-language:/opt/ra2/config/aoe2-language:ro
      - ./config/starcraft-ddraw.ini:/opt/ra2/config/starcraft-ddraw.ini:ro
      - ./container/cleanup-xvfb-display.sh:/opt/ra2/cleanup-xvfb-display.sh:ro
      - ./container/start-xvfb-ultra.sh:/opt/ra2/start-xvfb-ultra.sh:ro
      - ./container/configure-display-modes.sh:/opt/ra2/configure-display-modes.sh:ro
      - ./container/apply-ultra-display.sh:/opt/ra2/apply-ultra-display.sh:ro
      - ./container/switch-game-display.sh:/opt/ra2/switch-game-display.sh:ro
      - ./container/sync-game-transport.sh:/opt/ra2/sync-game-transport.sh:ro
      - ./container/ensure-game-ini-links.sh:/opt/ra2/ensure-game-ini-links.sh:ro
      - ./container/sync-audio-transport.sh:/opt/ra2/sync-audio-transport.sh:ro
      - ./container/start-stream-gateway.sh:/opt/ra2/start-stream-gateway.sh:ro
      - ./container/log-video-diagnostics.sh:/opt/ra2/log-video-diagnostics.sh:ro
      - ./container/winedbg-minidump.sh:/opt/ra2/winedbg-minidump.sh:ro
      - ./container/ra2-stream-gateway.py:/opt/ra2/ra2-stream-gateway.py:ro
      - ./container/stream-helper.c:/opt/ra2/stream-helper.c:ro
      - ./container/remote-ultra:/opt/ra2/remote-ultra:ro
      - ${LOGS_DIR:-/volume2/Data/App_Development/ra2-lan-party/logs}:/home/commander/ra2-logs-root:rw

  # RAM-backed debug player (scripts/dev-ram-ultra.sh). Port 6091; tmpfs + /dev/shm binds.
  ra2-player-dev:
    <<: *ra2-ultra
    container_name: ra2-player-dev
    profiles: ["ram-dev"]
    restart: "no"
    mem_limit: "${DEV_RAM_MEM_LIMIT:-5120m}"
    shm_size: "${DEV_RAM_SHM_SIZE:-2048m}"
    ports:
      - "${DEV_RAM_HTTP_PORT:-6091}:6080/tcp"
    tmpfs:
      - /home/commander/ra2-logs-root:rw,noexec,nosuid,size=${DEV_RAM_TMPFS_LOGS:-1536m}
      - /home/commander/.ra2:rw,noexec,nosuid,size=${DEV_RAM_TMPFS_STATE:-64m}
      - /home/commander/.cache:rw,noexec,nosuid,size=${DEV_RAM_TMPFS_CACHE:-256m}
      - /tmp:rw,noexec,nosuid,size=${DEV_RAM_TMPFS_TMP:-2048m}
    environment:
      <<: *ra2-ultra-env
      PLAYER_ID: "1"
      PLAYER_SERIAL: ${PLAYER1_SERIAL:?set PLAYER1_SERIAL in .env}
      ULTRA_GAME_LOG_ROOT: /home/commander/ra2-logs-root
      ULTRA_GAME_DIAGNOSTIC_DIR: /home/commander/ra2-logs-root/player1
      ULTRA_GAME_WORK_DIR: /home/commander/ra2-logs-root/player1/game-work
    volumes:
      - ${RAM_ASSETS_DIR:-${ASSETS_DIR:-/volume2/Data/App_Development/ra2-lan-party/assets}}:/home/commander/game_assets:ro
      - ${RAM_PREFIX_DIR:-/dev/shm/ra2-dev/prefix-player1}:/home/commander/.wine:rw
      - ${RAM_TLS_DIR:-${TLS_DIR:-/volume2/Data/App_Development/ra2-lan-party/tls}}:/opt/ra2/tls:ro
      - ./container/entrypoint-ultra.sh:/opt/ra2/entrypoint.sh:ro
      - ./container/supervisord.ultra.conf:/opt/ra2/supervisord.conf:ro
      - ./container/start-game-ultra.sh:/opt/ra2/start-game-ultra.sh:ro
      - ./container/run-game-session.sh:/opt/ra2/run-game-session.sh:ro
      - ./container/prepare-starcraft-session.sh:/opt/ra2/prepare-starcraft-session.sh:ro
      - ./container/prepare-aoe2-session.sh:/opt/ra2/prepare-aoe2-session.sh:ro
      - ./container/install-aoe2-10c.sh:/opt/ra2/install-aoe2-10c.sh:ro
      - ./container/game-launcher.sh:/opt/ra2/game-launcher.sh:ro
      - ./container/game-session-state.sh:/opt/ra2/game-session-state.sh:ro
      - ./container/validate-game-id.sh:/opt/ra2/validate-game-id.sh:ro
      - ./container/secure-game-select.sh:/opt/ra2/secure-game-select.sh:ro
      - ./container/start-openbox-ultra.sh:/opt/ra2/start-openbox-ultra.sh:ro
      - ./container/openbox:/opt/ra2/openbox:ro
      - ./config/games.json:/opt/ra2/config/games.json:ro
      - ./config/aoe2-ddraw.ini:/opt/ra2/config/aoe2-ddraw.ini:ro
      - ./config/aoe2-language:/opt/ra2/config/aoe2-language:ro
      - ./config/starcraft-ddraw.ini:/opt/ra2/config/starcraft-ddraw.ini:ro
      - ./container/cleanup-xvfb-display.sh:/opt/ra2/cleanup-xvfb-display.sh:ro
      - ./container/start-xvfb-ultra.sh:/opt/ra2/start-xvfb-ultra.sh:ro
      - ./container/configure-display-modes.sh:/opt/ra2/configure-display-modes.sh:ro
      - ./container/apply-ultra-display.sh:/opt/ra2/apply-ultra-display.sh:ro
      - ./container/switch-game-display.sh:/opt/ra2/switch-game-display.sh:ro
      - ./container/sync-game-transport.sh:/opt/ra2/sync-game-transport.sh:ro
      - ./container/ensure-game-ini-links.sh:/opt/ra2/ensure-game-ini-links.sh:ro
      - ./container/sync-audio-transport.sh:/opt/ra2/sync-audio-transport.sh:ro
      - ./container/start-stream-gateway.sh:/opt/ra2/start-stream-gateway.sh:ro
      - ./container/log-video-diagnostics.sh:/opt/ra2/log-video-diagnostics.sh:ro
      - ./container/winedbg-minidump.sh:/opt/ra2/winedbg-minidump.sh:ro
      - ./container/ra2-stream-gateway.py:/opt/ra2/ra2-stream-gateway.py:ro
      - ./container/stream-helper.c:/opt/ra2/stream-helper.c:ro
      - ./container/remote-ultra:/opt/ra2/remote-ultra:ro
      - ./container/pulse:/opt/ra2/pulse:ro
      - ./container/asound.conf:/etc/asound.conf:ro
    networks:
      ra2_lan:
        ipv4_address: 172.22.20.21
