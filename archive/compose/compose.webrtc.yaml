# WebRTC remote-play overlay: grouped TCP/WSS signaling/input + UDP media.
# Launch: RA2_COMPOSE_WEBRTC=1 docker compose --env-file .env -f compose.yaml -f compose.https.yaml -f compose.webrtc.yaml up -d

x-ra2-webrtc: &ra2-webrtc
  devices:
    - ${DRI_DEVICE:-/dev/dri}:/dev/dri
  group_add:
    - "${RENDER_GID:-937}"
    - "${VIDEO_GID:-44}"
  environment:
    WEBRTC_ENABLED: "1"
    WEBRTC_SIGNAL_PORT: "6090"
    WEBRTC_INPUT_PORT: "5731"
    STUN_URL: ${STUN_URL:-stun:stun.l.google.com:19302}
    LIBVA_DRIVER_NAME: ${LIBVA_DRIVER_NAME:-i965}
    GST_VAAPI_ALL_DRIVERS: "1"
    GST_VA_ALL_DRIVERS: "1"
    WEBRTC_LATENCY_PRESET: ${WEBRTC_LATENCY_PRESET:-stable}
    WEBRTC_VIDEO_CODEC: ${WEBRTC_VIDEO_CODEC:-H264}
    WEBRTC_VIDEO_REQUIRE_HW: ${WEBRTC_VIDEO_REQUIRE_HW:-1}
    WEBRTC_VIDEO_WIDTH: ${WEBRTC_VIDEO_WIDTH:-1024}
    WEBRTC_VIDEO_HEIGHT: ${WEBRTC_VIDEO_HEIGHT:-768}
    WEBRTC_VIDEO_FPS: ${WEBRTC_VIDEO_FPS:-20}
    WEBRTC_VIDEO_BITRATE: ${WEBRTC_VIDEO_BITRATE:-800000}
    WEBRTC_VIDEO_KEYFRAME_SECONDS: ${WEBRTC_VIDEO_KEYFRAME_SECONDS:-1}
    WEBRTC_VIDEO_RTP_MTU: ${WEBRTC_VIDEO_RTP_MTU:-700}
    WEBRTC_OFFER_WAIT_SECONDS: ${WEBRTC_OFFER_WAIT_SECONDS:-30}
    WEBRTC_AUDIO_BITRATE: ${WEBRTC_AUDIO_BITRATE:-96000}
    WEBRTC_AUDIO_FRAME_MS: ${WEBRTC_AUDIO_FRAME_MS:-10}
    WEBRTC_ICE_TCP: ${WEBRTC_ICE_TCP:-1}
    WEBRTC_ICE_UDP: ${WEBRTC_ICE_UDP:-0}
    WEBRTC_INPUT_BACKEND: ${WEBRTC_INPUT_BACKEND:-xdotool}
    UINPUT_DEVICE: ${UINPUT_DEVICE:-/dev/uinput}
    NAS_PUBLIC_HOSTNAME: ${NAS_PUBLIC_HOSTNAME:-}
    NAS_LAN_IP: ${NAS_LAN_IP:-}
    WEBRTC_SIGNAL_TLS: ${WEBRTC_SIGNAL_TLS:-}
    WEBRTC_INPUT_TLS: ${WEBRTC_INPUT_TLS:-}

services:
  ra2-player-1:
    <<: *ra2-webrtc
    environment:
      WEBRTC_ENABLED: "1"
      WEBRTC_SIGNAL_PORT: "6090"
      WEBRTC_INPUT_PORT: "5731"
      WEBRTC_UDP_PORT_MIN: ${PLAYER1_WEBRTC_UDP_MIN:-62001}
      WEBRTC_UDP_PORT_MAX: ${PLAYER1_WEBRTC_UDP_MAX:-62020}
      WEBRTC_VIDEO_UDP_PORT_MIN: ${PLAYER1_WEBRTC_VIDEO_UDP_MIN:-62001}
      WEBRTC_VIDEO_UDP_PORT_MAX: ${PLAYER1_WEBRTC_VIDEO_UDP_MAX:-62010}
      WEBRTC_AUDIO_UDP_PORT_MIN: ${PLAYER1_WEBRTC_AUDIO_UDP_MIN:-62011}
      WEBRTC_AUDIO_UDP_PORT_MAX: ${PLAYER1_WEBRTC_AUDIO_UDP_MAX:-62020}
      STUN_URL: ${STUN_URL:-stun:stun.l.google.com:19302}
      LIBVA_DRIVER_NAME: ${LIBVA_DRIVER_NAME:-i965}
      GST_VAAPI_ALL_DRIVERS: "1"
      GST_VA_ALL_DRIVERS: "1"
      WEBRTC_LATENCY_PRESET: ${WEBRTC_LATENCY_PRESET:-stable}
      WEBRTC_VIDEO_CODEC: ${WEBRTC_VIDEO_CODEC:-H264}
      WEBRTC_VIDEO_REQUIRE_HW: ${WEBRTC_VIDEO_REQUIRE_HW:-1}
      WEBRTC_VIDEO_WIDTH: ${WEBRTC_VIDEO_WIDTH:-1024}
      WEBRTC_VIDEO_HEIGHT: ${WEBRTC_VIDEO_HEIGHT:-768}
      WEBRTC_VIDEO_FPS: ${WEBRTC_VIDEO_FPS:-20}
      WEBRTC_VIDEO_BITRATE: ${WEBRTC_VIDEO_BITRATE:-800000}
      WEBRTC_VIDEO_KEYFRAME_SECONDS: ${WEBRTC_VIDEO_KEYFRAME_SECONDS:-1}
      WEBRTC_VIDEO_RTP_MTU: ${WEBRTC_VIDEO_RTP_MTU:-700}
      WEBRTC_OFFER_WAIT_SECONDS: ${WEBRTC_OFFER_WAIT_SECONDS:-30}
      WEBRTC_AUDIO_BITRATE: ${WEBRTC_AUDIO_BITRATE:-96000}
      WEBRTC_AUDIO_FRAME_MS: ${WEBRTC_AUDIO_FRAME_MS:-10}
      WEBRTC_ICE_TCP: ${WEBRTC_ICE_TCP:-1}
      WEBRTC_ICE_UDP: ${WEBRTC_ICE_UDP:-0}
      WEBRTC_INPUT_BACKEND: ${WEBRTC_INPUT_BACKEND:-xdotool}
      UINPUT_DEVICE: ${UINPUT_DEVICE:-/dev/uinput}
      NAS_PUBLIC_HOSTNAME: ${NAS_PUBLIC_HOSTNAME:-}
      NAS_LAN_IP: ${NAS_LAN_IP:-}
      WEBRTC_ICE_CANDIDATE_HOST: ${WEBRTC_ICE_CANDIDATE_HOST:-}
      WEBRTC_RECOMPILE_HELPER: ${WEBRTC_RECOMPILE_HELPER:-0}
      WEBRTC_SIGNAL_TLS: ${WEBRTC_SIGNAL_TLS:-}
      WEBRTC_INPUT_TLS: ${WEBRTC_INPUT_TLS:-}
    ports:
      - "${PLAYER1_WEBRTC_SIGNAL_PORT:-6083}:6090/tcp"
      - "${PLAYER1_WEBRTC_INPUT_PORT:-6085}:5731/tcp"
      - "${PLAYER1_WEBRTC_UDP_MIN:-62001}-${PLAYER1_WEBRTC_UDP_MAX:-62020}:${PLAYER1_WEBRTC_UDP_MIN:-62001}-${PLAYER1_WEBRTC_UDP_MAX:-62020}/udp"
      - "${PLAYER1_WEBRTC_UDP_MIN:-62001}-${PLAYER1_WEBRTC_UDP_MAX:-62020}:${PLAYER1_WEBRTC_UDP_MIN:-62001}-${PLAYER1_WEBRTC_UDP_MAX:-62020}/tcp"
    volumes:
      - ./container/webrtc-media.py:/opt/ra2/webrtc-media.py:ro
      - ./container/webrtc-media-helper.c:/opt/ra2/webrtc-media-helper.c:ro
      - ./archive/container/input-proxy.py:/opt/ra2/input-proxy.py:ro
      - ./archive/container/uinput_backend.py:/opt/ra2/uinput_backend.py:ro
      - ./container/start-webrtc.sh:/opt/ra2/start-webrtc.sh:ro
      - ./archive/container/start-input-proxy.sh:/opt/ra2/start-input-proxy.sh:ro
      - ./container/remote:/opt/ra2/remote:ro

  ra2-player-2:
    <<: *ra2-webrtc
    environment:
      WEBRTC_ENABLED: "1"
      WEBRTC_SIGNAL_PORT: "6090"
      WEBRTC_INPUT_PORT: "5731"
      WEBRTC_UDP_PORT_MIN: ${PLAYER2_WEBRTC_UDP_MIN:-62021}
      WEBRTC_UDP_PORT_MAX: ${PLAYER2_WEBRTC_UDP_MAX:-62040}
      WEBRTC_VIDEO_UDP_PORT_MIN: ${PLAYER2_WEBRTC_VIDEO_UDP_MIN:-62021}
      WEBRTC_VIDEO_UDP_PORT_MAX: ${PLAYER2_WEBRTC_VIDEO_UDP_MAX:-62030}
      WEBRTC_AUDIO_UDP_PORT_MIN: ${PLAYER2_WEBRTC_AUDIO_UDP_MIN:-62031}
      WEBRTC_AUDIO_UDP_PORT_MAX: ${PLAYER2_WEBRTC_AUDIO_UDP_MAX:-62040}
      STUN_URL: ${STUN_URL:-stun:stun.l.google.com:19302}
      LIBVA_DRIVER_NAME: ${LIBVA_DRIVER_NAME:-i965}
      GST_VAAPI_ALL_DRIVERS: "1"
      GST_VA_ALL_DRIVERS: "1"
      WEBRTC_LATENCY_PRESET: ${WEBRTC_LATENCY_PRESET:-stable}
      WEBRTC_VIDEO_CODEC: ${WEBRTC_VIDEO_CODEC:-H264}
      WEBRTC_VIDEO_REQUIRE_HW: ${WEBRTC_VIDEO_REQUIRE_HW:-1}
      WEBRTC_VIDEO_WIDTH: ${WEBRTC_VIDEO_WIDTH:-1024}
      WEBRTC_VIDEO_HEIGHT: ${WEBRTC_VIDEO_HEIGHT:-768}
      WEBRTC_VIDEO_FPS: ${WEBRTC_VIDEO_FPS:-20}
      WEBRTC_VIDEO_BITRATE: ${WEBRTC_VIDEO_BITRATE:-800000}
      WEBRTC_VIDEO_KEYFRAME_SECONDS: ${WEBRTC_VIDEO_KEYFRAME_SECONDS:-1}
      WEBRTC_VIDEO_RTP_MTU: ${WEBRTC_VIDEO_RTP_MTU:-700}
      WEBRTC_OFFER_WAIT_SECONDS: ${WEBRTC_OFFER_WAIT_SECONDS:-30}
      WEBRTC_AUDIO_BITRATE: ${WEBRTC_AUDIO_BITRATE:-96000}
      WEBRTC_AUDIO_FRAME_MS: ${WEBRTC_AUDIO_FRAME_MS:-10}
      WEBRTC_ICE_TCP: ${WEBRTC_ICE_TCP:-1}
      WEBRTC_ICE_UDP: ${WEBRTC_ICE_UDP:-0}
      WEBRTC_INPUT_BACKEND: ${WEBRTC_INPUT_BACKEND:-xdotool}
      UINPUT_DEVICE: ${UINPUT_DEVICE:-/dev/uinput}
      NAS_PUBLIC_HOSTNAME: ${NAS_PUBLIC_HOSTNAME:-}
      NAS_LAN_IP: ${NAS_LAN_IP:-}
      WEBRTC_ICE_CANDIDATE_HOST: ${WEBRTC_ICE_CANDIDATE_HOST:-}
      WEBRTC_RECOMPILE_HELPER: ${WEBRTC_RECOMPILE_HELPER:-0}
      WEBRTC_SIGNAL_TLS: ${WEBRTC_SIGNAL_TLS:-}
      WEBRTC_INPUT_TLS: ${WEBRTC_INPUT_TLS:-}
    ports:
      - "${PLAYER2_WEBRTC_SIGNAL_PORT:-6084}:6090/tcp"
      - "${PLAYER2_WEBRTC_INPUT_PORT:-6086}:5731/tcp"
      - "${PLAYER2_WEBRTC_UDP_MIN:-62021}-${PLAYER2_WEBRTC_UDP_MAX:-62040}:${PLAYER2_WEBRTC_UDP_MIN:-62021}-${PLAYER2_WEBRTC_UDP_MAX:-62040}/udp"
      - "${PLAYER2_WEBRTC_UDP_MIN:-62021}-${PLAYER2_WEBRTC_UDP_MAX:-62040}:${PLAYER2_WEBRTC_UDP_MIN:-62021}-${PLAYER2_WEBRTC_UDP_MAX:-62040}/tcp"
    volumes:
      - ./container/webrtc-media.py:/opt/ra2/webrtc-media.py:ro
      - ./container/webrtc-media-helper.c:/opt/ra2/webrtc-media-helper.c:ro
      - ./archive/container/input-proxy.py:/opt/ra2/input-proxy.py:ro
      - ./archive/container/uinput_backend.py:/opt/ra2/uinput_backend.py:ro
      - ./container/start-webrtc.sh:/opt/ra2/start-webrtc.sh:ro
      - ./archive/container/start-input-proxy.sh:/opt/ra2/start-input-proxy.sh:ro
      - ./container/remote:/opt/ra2/remote:ro
