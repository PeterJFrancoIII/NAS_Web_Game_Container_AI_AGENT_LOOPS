<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RA2 Remote Play (WebRTC fallback)</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: #f4f4f4;
    }
    header {
      position: fixed;
      z-index: 2;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(4px);
    }
    #status { color: #9bd3ff; }
    body.controls-hidden header {
      display: none;
    }
    main {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: #000;
    }
    #surface {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
    }
    #remoteCanvas {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100vh;
      background: #000;
      border: 0;
      outline: 0;
      cursor: crosshair;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    #remoteVideo {
      position: fixed;
      left: -10000px;
      top: 0;
      width: 1280px;
      height: 720px;
      opacity: 0.01;
      pointer-events: none;
    }
    body.direct-video #remoteVideo {
      position: absolute;
      z-index: 1;
      left: 50%;
      top: 50%;
      opacity: 1;
      transform: translate(-50%, -50%);
      background: #000;
    }
    body.direct-video #remoteCanvas {
      background: transparent;
    }
    #remoteAudio {
      display: none;
    }
    #overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #cfe8ff;
      background: radial-gradient(circle at center, rgba(25,35,48,0.55), rgba(0,0,0,0.92));
      text-align: center;
      cursor: pointer;
    }
    #overlay.hidden {
      display: none;
    }
    #overlayStatus {
      max-width: 760px;
      padding: 16px 18px;
      border: 1px solid rgba(155,211,255,0.35);
      border-radius: 8px;
      background: rgba(0,0,0,0.68);
      white-space: pre-wrap;
    }
    .hint { color: #b8c4d0; margin-top: 8px; text-align: center; }
    #settingsButton {
      position: fixed;
      z-index: 4;
      right: 16px;
      bottom: 16px;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(155,211,255,0.45);
      border-radius: 999px;
      background: rgba(0,0,0,0.78);
      color: #f4f4f4;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    #settingsButton:hover,
    #settingsButton:focus-visible {
      border-color: rgba(155,211,255,0.9);
      outline: none;
    }
    #settingsPanel {
      position: fixed;
      z-index: 5;
      right: 16px;
      bottom: 72px;
      width: min(340px, calc(100vw - 32px));
      padding: 14px;
      border: 1px solid rgba(155,211,255,0.35);
      border-radius: 10px;
      background: rgba(7,11,16,0.94);
      box-shadow: 0 18px 60px rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
    }
    #settingsPanel.hidden {
      display: none;
    }
    .settings-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-weight: 700;
    }
    .settings-row {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }
    .settings-row label {
      color: #cfe8ff;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .settings-row select,
    .settings-row input[type="range"],
    .settings-row button {
      width: 100%;
      box-sizing: border-box;
    }
    .settings-row select,
    .settings-row button {
      min-height: 34px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      color: #f4f4f4;
    }
    .settings-row button {
      cursor: pointer;
    }
    .settings-check {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
      color: #d7e6f5;
    }
    .settings-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .settings-note {
      margin-top: 10px;
      color: #b8c4d0;
      font-size: 12px;
    }
    a { color: #9bd3ff; }
  </style>
</head>
<body>
  <header>
    <strong>RA2 Remote Play</strong>
    <span id="status">connecting…</span>
    <a id="novncLink" href="../vnc.html">noVNC admin fallback</a>
  </header>
  <main>
    <div id="surface">
      <canvas id="remoteCanvas" tabindex="0" aria-label="RA2 remote desktop surface"></canvas>
      <video id="remoteVideo" autoplay playsinline muted></video>
      <audio id="remoteAudio" autoplay></audio>
      <div id="overlay">
        <div>
          <div id="overlayStatus">connecting...</div>
          <div class="hint">Click the remote surface to capture mouse/keyboard. Ctrl+Alt+L locks pointer when supported.</div>
        </div>
      </div>
    </div>
  </main>
  <button id="settingsButton" type="button" aria-label="Remote play settings" aria-expanded="false">⚙</button>
  <section id="settingsPanel" class="hidden" aria-label="Remote play settings">
    <div class="settings-title">
      <span>Remote Settings</span>
      <button id="settingsClose" type="button">Close</button>
    </div>
    <div class="settings-row">
      <label for="fitMode">Screen fit</label>
      <select id="fitMode">
        <option value="contain">Fit whole screen</option>
        <option value="cover">Fill screen / crop edges</option>
        <option value="stretch">Stretch to window</option>
        <option value="native">Native size centered</option>
      </select>
    </div>
    <div class="settings-row">
      <label for="renderMode">Render mode</label>
      <select id="renderMode">
        <option value="direct">Direct video (best for Safari)</option>
        <option value="canvas">Canvas copy</option>
      </select>
    </div>
    <div class="settings-row">
      <label for="audioVolume">Audio volume</label>
      <input id="audioVolume" type="range" min="0" max="100" step="1" />
    </div>
    <label class="settings-check">
      <input id="showCursor" type="checkbox" />
      Show browser cursor
    </label>
    <label class="settings-check">
      <input id="showControls" type="checkbox" />
      Show bottom status bar
    </label>
    <label class="settings-check">
      <input id="videoSmoothing" type="checkbox" />
      Smooth scaled video
    </label>
    <div class="settings-actions">
      <button id="fullscreenButton" type="button">Fullscreen</button>
      <button id="pointerLockButton" type="button">Pointer lock</button>
      <button id="reconnectButton" type="button">Reconnect</button>
      <button id="reloadButton" type="button">Reload page</button>
    </div>
    <div class="settings-note">Fullscreen and pointer lock must be started from a click. Press Esc to exit either mode.</div>
  </section>
  <script src="remote-play.js?v=11"></script>
</body>
</html>
